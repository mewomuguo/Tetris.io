<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Tetris</title>
  <style>
    /* 全域設定與動態高度 */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #111; /* 背景調暗，讓遊戲更沉浸 */
      color: #fff;
      /* 使用 dvh (Dynamic Viewport Height) 避開手機瀏覽器的上下網址列 */
      height: 100vh;
      height: 100dvh; 
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      /* 防止整個畫面被長按選取或拖曳 */
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: none; 
    }
    
    /* 核心主容器 */
    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      max-width: 480px;
      padding: 10px;
      padding-bottom: env(safe-area-inset-bottom, 10px); /* 避開底部黑條 */
      box-sizing: border-box;
      gap: 10px;
    }

    /* 1. 上半部：遊戲畫面 (自動填滿剩餘空間) */
    #game-area {
      flex: 1 1 auto;
      min-height: 0; /* 讓 Flex 子元素可以順利縮小 */
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }
    
    .canvas-wrapper {
      position: relative;
      height: 100%; 
      aspect-ratio: 12 / 20; /* 維持俄羅斯方塊標準比例 */
      max-width: 100%;
    }

    canvas#tetris {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
      border: 2px solid #444;
      border-radius: 6px;
      box-sizing: border-box;
      box-shadow: 0 0 15px rgba(0,0,0,0.8);
    }

    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      font-weight: bold;
      color: #fff;
      border-radius: 4px;
      pointer-events: none;
    }
    #overlay.hidden { display: none; }

    #msg-overlay {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      text-align: center;
      color: #FFD700;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 2px 2px 5px #000;
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
      z-index: 10;
    }

    /* 2. 中間：資訊與按鈕面板 (緊湊設計) */
    #info-panel {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #1e1e1e;
      padding: 10px;
      border-radius: 10px;
      width: 100%;
      box-sizing: border-box;
    }

    #stats-row {
      display: flex;
      justify-content: space-between;
      background: #2a2a2a;
      padding: 8px;
      border-radius: 6px;
    }
    .stat-box { text-align: center; flex: 1; }
    .stat-lbl { color: #0CF; font-size: 12px; font-weight: bold; }
    .stat-val { color: #fff; font-size: 16px; font-weight: bold; display: block; margin-top: 2px;}

    #action-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    
    #next-piece-container {
      background: #2a2a2a;
      padding: 5px;
      border-radius: 6px;
      text-align: center;
      flex: 0 0 70px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    #ui-next-lbl { color: #aaa; font-size: 11px; font-weight: bold; margin-bottom: 2px; }
    canvas#next-piece {
      width: 50px;
      height: 50px;
      background: #000;
      border: 1px solid #444;
      border-radius: 4px;
      display: block;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 6px;
      flex: 1;
    }
    button {
      flex: 1;
      background: #444;
      color: #fff;
      border: none;
      font-size: 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s, transform 0.1s;
      touch-action: manipulation; 
    }
    button:active { transform: scale(0.95); }
    button#start-btn { background: #28a745; }
    button#start-btn:hover { background: #218838; }
    button#pause-btn { background: #ffc107; color: #000; }
    button#pause-btn:hover { background: #e0a800; }
    button:disabled { background: #333 !important; color: #777 !important; cursor: not-allowed; transform: none !important; }

    /* 3. 下半部：縮小後的 Joycon 觸控區 */
    #mobile-controls {
      flex: 0 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 15px;
      width: 100%;
      box-sizing: border-box;
    }

    /* 左側十字鍵 (D-Pad) */
    .joycon-dpad {
      display: grid;
      /* 縮小按鍵尺寸：由 55px 改為 40px */
      grid-template-columns: 40px 40px 40px;
      grid-template-rows: 40px 40px 40px;
      gap: 3px;
    }

    .dpad-btn {
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid #555;
      color: white;
      font-size: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      border-radius: 6px;
    }
    .dpad-btn:active { background: rgba(255, 255, 255, 0.4); border-color: #0CF; }
    .dpad-center { background: #222; border: 2px solid #444; border-radius: 4px; }

    /* 右側動作鍵 (旋轉) */
    .joycon-action {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
    }
    .action-btn {
      /* 縮小按鈕尺寸：由 80px 改為 65px */
      width: 65px;
      height: 65px;
      border-radius: 50%;
      background: rgba(0, 204, 255, 0.2);
      border: 3px solid #0CF;
      color: white;
      font-size: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .action-btn:active { background: rgba(0, 204, 255, 0.5); transform: scale(0.95); }

    /* 電腦版隱藏手把與鍵盤提示設定 */
    #controls-hint { display: none; text-align: center; color: #aaa; font-size: 12px; margin-top: 10px; }
    kbd { background: #333; border: 1px solid #555; border-radius: 3px; padding: 2px 4px; color: #fff; font-family: monospace; }
    
    @media (hover: hover) and (pointer: fine) {
      #mobile-controls { display: none; }
      #controls-hint { display: block; }
    }
  </style>
</head>
<body>

  <div id="app">
    <div id="game-area">
      <div class="canvas-wrapper">
        <canvas id="tetris" width="240" height="400"></canvas>
        <div id="overlay">Ready</div>
        <div id="msg-overlay"></div>
      </div>
    </div>
    
    <div id="info-panel">
      <div id="stats-row">
        <div class="stat-box">
          <span class="stat-lbl" id="ui-score-lbl">Score</span>
          <span id="score" class="stat-val">0</span>
        </div>
        <div class="stat-box">
          <span class="stat-lbl" id="ui-lines-lbl">Lines</span>
          <span id="lines" class="stat-val">0</span>
        </div>
        <div class="stat-box">
          <span class="stat-lbl" id="ui-level-lbl">Level</span>
          <span id="level" class="stat-val">1</span>
        </div>
      </div>
      
      <div id="action-row">
        <div id="next-piece-container">
          <div id="ui-next-lbl">Next</div>
          <canvas id="next-piece" width="80" height="80"></canvas>
        </div>
        <div class="btn-group">
          <button id="start-btn">Start Game</button>
          <button id="pause-btn" disabled>Pause</button>
        </div>
      </div>
    </div>

    <div id="mobile-controls">
      <div class="joycon-dpad">
        <div style="grid-column: 1; grid-row: 1;"></div>
        <div style="grid-column: 2; grid-row: 1;"></div>
        <div style="grid-column: 3; grid-row: 1;"></div>
        
        <div id="btn-left" class="dpad-btn" style="grid-column: 1; grid-row: 2; border-radius: 12px 4px 4px 12px;">◀</div>
        <div class="dpad-center" style="grid-column: 2; grid-row: 2;"></div>
        <div id="btn-right" class="dpad-btn" style="grid-column: 3; grid-row: 2; border-radius: 4px 12px 12px 4px;">▶</div>
        
        <div style="grid-column: 1; grid-row: 3;"></div>
        <div id="btn-down" class="dpad-btn" style="grid-column: 2; grid-row: 3; border-radius: 4px 4px 12px 12px;">▼</div>
        <div style="grid-column: 3; grid-row: 3;"></div>
      </div>

      <div class="joycon-action">
        <div id="btn-rotate" class="action-btn">↻</div>
      </div>
    </div>
    
    <div id="controls-hint"></div>
  </div>

  <script>
    // --- 語言與 i18n 系統 ---
    const i18n = {
      en: {
        score: "Score", lines: "Lines", level: "Level", next: "Next",
        start: "Start Game", restart: "Restart", pause: "Pause", resume: "Resume",
        ready: "Ready", paused: "Paused", gameOver: "Game Over", finalScore: "Final Score",
        controls: "<kbd>←</kbd> <kbd>→</kbd> Move &nbsp;&nbsp;|&nbsp;&nbsp; <kbd>↑</kbd> Rotate &nbsp;&nbsp;|&nbsp;&nbsp; <kbd>↓</kbd> Drop &nbsp;&nbsp;|&nbsp;&nbsp; <kbd>Space</kbd> Pause",
        tspin: "T-Spin!", tspinLines: "T-Spin {n} Lines!"
      },
      zh: {
        score: "分數", lines: "消除行數", level: "等級", next: "下一個",
        start: "開始遊戲", restart: "重新開始", pause: "暫停", resume: "繼續",
        ready: "準備開始", paused: "已暫停", gameOver: "遊戲結束", finalScore: "最終分數",
        controls: "<kbd>←</kbd> <kbd>→</kbd> 移動 &nbsp;&nbsp;|&nbsp;&nbsp; <kbd>↑</kbd> 旋轉 &nbsp;&nbsp;|&nbsp;&nbsp; <kbd>↓</kbd> 下落 &nbsp;&nbsp;|&nbsp;&nbsp; <kbd>空白鍵</kbd> 暫停",
        tspin: "T-Spin!", tspinLines: "T-Spin {n} 行!"
      }
    };

    const userLang = navigator.language || navigator.userLanguage;
    const currentLang = userLang.startsWith('zh') ? 'zh' : 'en';
    document.documentElement.lang = currentLang;

    function t(key, params = {}) {
      let text = i18n[currentLang][key] || key;
      for (const p in params) { text = text.replace(`{${p}}`, params[p]); }
      return text;
    }

    document.getElementById('ui-score-lbl').innerText = t('score');
    document.getElementById('ui-lines-lbl').innerText = t('lines');
    document.getElementById('ui-level-lbl').innerText = t('level');
    document.getElementById('ui-next-lbl').innerText = t('next');
    document.getElementById('start-btn').innerText = t('start');
    document.getElementById('pause-btn').innerText = t('pause');
    document.getElementById('overlay').innerText = t('ready');
    document.getElementById('controls-hint').innerHTML = t('controls');

    // --- 遊戲核心 ---
    const canvas = document.getElementById("tetris");
    const ctx = canvas.getContext("2d");
    const overlay = document.getElementById("overlay");
    const scoreEl = document.getElementById("score");
    const linesEl = document.getElementById("lines");
    const levelEl = document.getElementById("level");
    const startBtn = document.getElementById("start-btn");
    const pauseBtn = document.getElementById("pause-btn");
    const nextCanvas = document.getElementById("next-piece");
    const nextCtx = nextCanvas.getContext("2d");

    const W = 12;
    const H = 20;
    const SIZE = 20;

    ctx.scale(SIZE, SIZE);

    let score = 0, lines = 0, level = 1;
    let gameRunning = false, isPaused = false;
    let dropCounter = 0, dropInterval = 1000, lastTime = 0;
    let animationId = null, nextPieceMatrix = null, lastAction = null;

    let board = createMatrix(W, H);

    const PIECES = [
      [[0,0,0], [1,1,1], [0,1,0]],
      [[0,2,0,0], [0,2,0,0], [0,2,0,0], [0,2,0,0]],
      [[3,3], [3,3]],
      [[0,4,4], [4,4,0], [0,0,0]],
      [[5,5,0], [0,5,5], [0,0,0]],
      [[0,6,0], [0,6,0], [0,6,6]],
      [[0,7,0], [0,7,0], [7,7,0]]
    ];

    const COLORS = [null, "#F00", "#0CF", "#FF0", "#0F0", "#F0F", "#F80", "#00F"];

    const player = { pos: { x: 0, y: 0 }, matrix: null };

    function createMatrix(w, h) {
      const matrix = [];
      while (h--) { matrix.push(new Array(w).fill(0)); }
      return matrix;
    }

    function newPiece() {
      const typeId = Math.floor(Math.random() * PIECES.length);
      return PIECES[typeId].map(row => [...row]);
    }

    function drawMatrix(matrix, offset, isGhost = false) {
      matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            if (isGhost) {
              ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
              ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
              ctx.lineWidth = 0.05;
              ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
              ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
            } else {
              ctx.fillStyle = COLORS[value];
              ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
              ctx.lineWidth = 0.05;
              ctx.strokeStyle = "rgba(0,0,0,0.5)";
              ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
            }
          }
        });
      });
    }

    function draw() {
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawMatrix(board, { x: 0, y: 0 });
      
      if (player.matrix) {
        const ghost = { matrix: player.matrix, pos: { x: player.pos.x, y: player.pos.y } };
        while (!collide(board, ghost)) { ghost.pos.y++; }
        ghost.pos.y--;
        drawMatrix(ghost.matrix, ghost.pos, true);
        drawMatrix(player.matrix, player.pos);
      }
    }

    function collide(board, player) {
      const m = player.matrix, o = player.pos;
      for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
          if (m[y][x] !== 0 && (board[y + o.y] && board[y + o.y][x + o.x]) !== 0) { return true; }
        }
      }
      return false;
    }

    function merge(board, player) {
      player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) { board[y + player.pos.y][x + player.pos.x] = value; }
        });
      });
    }

    function rotate(matrix, dir) {
      for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) {
          [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
      }
      if (dir > 0) matrix.forEach(row => row.reverse());
      else matrix.reverse();
    }

    function playerRotate(dir) {
      const pos = player.pos.x;
      let offset = 1;
      rotate(player.matrix, dir);
      while (collide(board, player)) {
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));
        if (offset > player.matrix[0].length) {
          rotate(player.matrix, -dir);
          player.pos.x = pos;
          return;
        }
      }
      lastAction = 'rotate';
    }

    function playerMove(offset) {
      player.pos.x += offset;
      if (collide(board, player)) { player.pos.x -= offset; } 
      else { lastAction = 'move'; }
    }

    function checkTSpin() {
      if (!player.matrix.some(row => row.includes(1))) return false;
      if (lastAction !== 'rotate') return false;

      let occupiedCorners = 0;
      const px = player.pos.x, py = player.pos.y;
      const corners = [{x: px, y: py}, {x: px + 2, y: py}, {x: px, y: py + 2}, {x: px + 2, y: py + 2}];

      corners.forEach(c => {
        if (c.x < 0 || c.x >= W || c.y >= H) occupiedCorners++;
        else if (c.y >= 0 && board[c.y][c.x] !== 0) occupiedCorners++;
      });
      return occupiedCorners >= 3;
    }

    function playerDrop() {
      player.pos.y++;
      if (collide(board, player)) {
        player.pos.y--;
        let isTSpin = checkTSpin();
        merge(board, player);
        playerReset();
        clearLines(isTSpin);
      } else {
        lastAction = 'drop';
      }
      dropCounter = 0;
    }

    function drawNextPiece() {
      nextCtx.fillStyle = "#000";
      nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
      if (!nextPieceMatrix) return;
      const blockSize = 20;
      const offsetX = (nextCanvas.width - nextPieceMatrix[0].length * blockSize) / 2;
      const offsetY = (nextCanvas.height - nextPieceMatrix.length * blockSize) / 2;
      
      nextPieceMatrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            nextCtx.fillStyle = COLORS[value];
            nextCtx.fillRect(offsetX + x * blockSize, offsetY + y * blockSize, blockSize, blockSize);
            nextCtx.lineWidth = 1;
            nextCtx.strokeStyle = "rgba(0,0,0,0.5)";
            nextCtx.strokeRect(offsetX + x * blockSize, offsetY + y * blockSize, blockSize, blockSize);
          }
        });
      });
    }

    function playerReset() {
      if (!nextPieceMatrix) nextPieceMatrix = newPiece();
      player.matrix = nextPieceMatrix;
      nextPieceMatrix = newPiece();
      drawNextPiece();
      player.pos.y = 0;
      player.pos.x = Math.floor((W / 2) - (player.matrix[0].length / 2));
      if (collide(board, player)) gameOver();
    }

    function showMessage(text) {
      const msgOverlay = document.getElementById("msg-overlay");
      msgOverlay.innerText = text;
      msgOverlay.style.opacity = 1;
      setTimeout(() => { msgOverlay.style.opacity = 0; }, 1000);
    }

    function clearLines(isTSpin) {
      let linesCleared = 0;
      outer: for (let y = board.length - 1; y >= 0; --y) {
        for (let x = 0; x < board[y].length; ++x) {
          if (board[y][x] === 0) continue outer;
        }
        const row = board.splice(y, 1)[0].fill(0);
        board.unshift(row);
        ++y;
        linesCleared++;
      }

      if (linesCleared > 0 || isTSpin) {
        let basePoints = 0;
        if (isTSpin) {
          const tSpinPoints = [400, 800, 1200, 1600];
          basePoints = tSpinPoints[linesCleared] || 1600;
          showMessage(linesCleared > 0 ? t('tspinLines', {n: linesCleared}) : t('tspin'));
        } else if (linesCleared > 0) {
          const points = [0, 100, 300, 500, 800];
          basePoints = points[linesCleared] || 800;
        }
        score += basePoints * level;
        lines += linesCleared;
        level = Math.floor(lines / 10) + 1;
        dropInterval = Math.max(100, 1000 - (level - 1) * 100);
        updateScore();
      }
      lastAction = null;
    }

    function updateScore() {
      scoreEl.innerText = score;
      linesEl.innerText = lines;
      levelEl.innerText = level;
    }

    function update(time = 0) {
      if (!gameRunning || isPaused) return;
      const deltaTime = time - lastTime;
      lastTime = time;
      dropCounter += deltaTime;
      if (dropCounter > dropInterval) playerDrop();
      draw();
      animationId = requestAnimationFrame(update);
    }

    function startGame() {
      board = createMatrix(W, H);
      score = 0; lines = 0; level = 1; dropInterval = 1000;
      updateScore();
      nextPieceMatrix = null;
      playerReset();
      gameRunning = true; isPaused = false;
      
      startBtn.innerText = t('restart');
      pauseBtn.disabled = false;
      pauseBtn.innerText = t('pause');
      overlay.classList.add("hidden");
      
      lastTime = performance.now();
      update();
    }

    function togglePause() {
      if (!gameRunning) return;
      isPaused = !isPaused;
      if (isPaused) {
        cancelAnimationFrame(animationId);
        pauseBtn.innerText = t('resume');
        overlay.innerText = t('paused');
        overlay.classList.remove("hidden");
      } else {
        pauseBtn.innerText = t('pause');
        overlay.classList.add("hidden");
        lastTime = performance.now();
        update();
      }
    }

    function gameOver() {
      gameRunning = false;
      cancelAnimationFrame(animationId);
      pauseBtn.disabled = true;
      overlay.innerHTML = `${t('gameOver')}<br><span style="font-size:16px; color:#ccc;">${t('finalScore')}: ${score}</span>`;
      overlay.classList.remove("hidden");
    }

    startBtn.addEventListener("click", () => { startGame(); startBtn.blur(); });
    pauseBtn.addEventListener("click", () => { togglePause(); pauseBtn.blur(); });

    document.addEventListener("keydown", event => {
      if (event.code === "Space") { event.preventDefault(); if (gameRunning) togglePause(); return; }
      if (!gameRunning || isPaused) return;
      switch (event.code) {
        case "ArrowLeft": playerMove(-1); event.preventDefault(); break;
        case "ArrowRight": playerMove(1); event.preventDefault(); break;
        case "ArrowDown": playerDrop(); event.preventDefault(); break;
        case "ArrowUp": playerRotate(1); event.preventDefault(); break;
      }
      draw();
    });

    // --- Pointer 觸控連發邏輯 ---
    function setupTouchControl(btnId, action, isContinuous = false) {
      const btn = document.getElementById(btnId);
      if (!btn) return;

      let holdInterval = null;
      let holdTimeout = null;

      const startAction = (e) => {
        if (e.cancelable) e.preventDefault(); 
        if (!gameRunning || isPaused) return;
        action();
        draw();

        if (isContinuous) {
          holdTimeout = setTimeout(() => {
            holdInterval = setInterval(() => { action(); draw(); }, 80); 
          }, 200); 
        }
      };

      const stopAction = (e) => {
        if (e.cancelable) e.preventDefault();
        clearTimeout(holdTimeout);
        clearInterval(holdInterval);
      };

      btn.addEventListener("pointerdown", startAction);
      btn.addEventListener("pointerup", stopAction);
      btn.addEventListener("pointerleave", stopAction);
      btn.addEventListener("pointercancel", stopAction);
      btn.addEventListener("contextmenu", e => e.preventDefault());
    }

    setupTouchControl("btn-left", () => playerMove(-1), true);
    setupTouchControl("btn-right", () => playerMove(1), true);
    setupTouchControl("btn-down", () => playerDrop(), true);
    setupTouchControl("btn-rotate", () => playerRotate(1), false);

    draw();

  </script>
</body>
</html>
