<!DOCTYPE html>
<html lang="en"> <!-- 預設為 en，JS 會自動依據系統更改 -->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tetris</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #222;
      color: #fff;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      margin-top: 0;
      color: #0CF;
      text-shadow: 0 0 10px rgba(0, 204, 255, 0.5);
    }
    #game-wrapper {
      position: relative;
      display: inline-block;
    }
    #game-container {
      display: flex;
      gap: 20px;
      background: #111;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
      align-items: flex-start;
    }
    #canvas-container {
      position: relative;
    }
    canvas {
      border: 2px solid #444;
      background: #000;
      border-radius: 4px;
      display: block;
    }
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      font-weight: bold;
      color: #fff;
      border-radius: 4px;
      pointer-events: none;
    }
    #overlay.hidden {
      display: none;
    }
    #side-panel {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 400px;
      width: 150px;
    }
    #info {
      background: #222;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #333;
      text-align: left;
    }
    #info p {
      margin: 10px 0;
      font-size: 16px;
      font-weight: bold;
    }
    #info span {
      color: #0CF;
      font-size: 20px;
    }
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    button {
      background: #444;
      color: #fff;
      border: none;
      padding: 12px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover {
      background: #555;
    }
    button:active {
      transform: scale(0.95);
    }
    button#start-btn {
      background: #28a745;
    }
    button#start-btn:hover {
      background: #218838;
    }
    button#pause-btn {
      background: #ffc107;
      color: #000;
    }
    button#pause-btn:hover {
      background: #e0a800;
    }
    button:disabled {
      background: #333 !important;
      color: #777 !important;
      cursor: not-allowed;
      transform: none !important;
    }
    #controls {
      margin-top: 20px;
      font-size: 14px;
      color: #aaa;
      background: #111;
      padding: 15px;
      border-radius: 8px;
      display: inline-block;
      line-height: 1.6;
    }
    kbd {
      background: #333;
      border: 1px solid #555;
      border-radius: 3px;
      padding: 2px 6px;
      color: #fff;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <h1 id="ui-title">Tetris</h1>
  
  <div id="game-wrapper">
    <div id="game-container">
      <div id="canvas-container">
        <canvas id="tetris" width="240" height="400"></canvas>
        <div id="overlay">Ready</div>
        <div id="msg-overlay" style="position:absolute; top:40%; left:50%; transform:translate(-50%, -50%); width:100%; text-align:center; color:#FFD700; font-size:24px; font-weight:bold; text-shadow:2px 2px 5px #000; opacity:0; transition:opacity 0.5s; pointer-events:none; z-index:10;"></div>
      </div>
      
      <div id="side-panel">
        <div id="info">
          <p><span id="ui-score-lbl">Score</span><br><span id="score">0</span></p>
          <p><span id="ui-lines-lbl">Lines</span><br><span id="lines">0</span></p>
          <p><span id="ui-level-lbl">Level</span><br><span id="level">1</span></p>
        </div>
        
        <div id="next-piece-container" style="background: #222; padding: 10px; border-radius: 8px; border: 1px solid #333; text-align: center; margin-bottom: 10px;">
          <div id="ui-next-lbl" style="font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #aaa;">Next</div>
          <canvas id="next-piece" width="80" height="80" style="background: #000; border: 1px solid #444; border-radius: 4px; display: block; margin: 0 auto;"></canvas>
        </div>
        
        <div class="btn-group">
          <button id="start-btn">Start Game</button>
          <button id="pause-btn" disabled>Pause</button>
        </div>
      </div>
    </div>
  </div>

  <div id="controls"></div>

  <script>
    // --- 語言與 i18n 系統 ---
    const i18n = {
      en: {
        title: "Tetris",
        score: "Score",
        lines: "Lines",
        level: "Level",
        next: "Next",
        start: "Start Game",
        restart: "Restart",
        pause: "Pause",
        resume: "Resume",
        ready: "Ready",
        paused: "Paused",
        gameOver: "Game Over",
        finalScore: "Final Score",
        controls: "<kbd>←</kbd> <kbd>→</kbd> Move &nbsp;&nbsp;|&nbsp;&nbsp; <kbd>↑</kbd> Rotate &nbsp;&nbsp;|&nbsp;&nbsp; <kbd>↓</kbd> Drop &nbsp;&nbsp;|&nbsp;&nbsp; <kbd>Space</kbd> Pause",
        tspin: "T-Spin!",
        tspinLines: "T-Spin {n} Lines!"
      },
      zh: {
        title: "俄羅斯方塊 Tetris",
        score: "分數",
        lines: "消除行數",
        level: "等級",
        next: "下一個",
        start: "開始遊戲",
        restart: "重新開始",
        pause: "暫停",
        resume: "繼續",
        ready: "準備開始",
        paused: "已暫停",
        gameOver: "遊戲結束",
        finalScore: "最終分數",
        controls: "<kbd>←</kbd> <kbd>→</kbd> 左右移動 &nbsp;&nbsp;|&nbsp;&nbsp; <kbd>↑</kbd> 旋轉方塊 &nbsp;&nbsp;|&nbsp;&nbsp; <kbd>↓</kbd> 加速下落 &nbsp;&nbsp;|&nbsp;&nbsp; <kbd>空白鍵</kbd> 暫停/繼續",
        tspin: "T-Spin!",
        tspinLines: "T-Spin {n} 行!"
      }
    };

    // 獲取使用者預設語言
    const userLang = navigator.language || navigator.userLanguage;
    // 如果系統語言包含 'zh' (如 zh-TW, zh-CN) 則使用中文，否則預設為英文
    const currentLang = userLang.startsWith('zh') ? 'zh' : 'en';
    document.documentElement.lang = currentLang;

    // 翻譯小工具函式
    function t(key, params = {}) {
      let text = i18n[currentLang][key] || key;
      for (const p in params) {
        text = text.replace(`{${p}}`, params[p]);
      }
      return text;
    }

    // 初始化 UI 文字
    document.title = t('title');
    document.getElementById('ui-title').innerText = t('title');
    document.getElementById('ui-score-lbl').innerText = t('score');
    document.getElementById('ui-lines-lbl').innerText = t('lines');
    document.getElementById('ui-level-lbl').innerText = t('level');
    document.getElementById('ui-next-lbl').innerText = t('next');
    document.getElementById('start-btn').innerText = t('start');
    document.getElementById('pause-btn').innerText = t('pause');
    document.getElementById('overlay').innerText = t('ready');
    document.getElementById('controls').innerHTML = t('controls');


    // --- 遊戲核心 ---
    const canvas = document.getElementById("tetris");
    const ctx = canvas.getContext("2d");
    const overlay = document.getElementById("overlay");
    const scoreEl = document.getElementById("score");
    const linesEl = document.getElementById("lines");
    const levelEl = document.getElementById("level");
    const startBtn = document.getElementById("start-btn");
    const pauseBtn = document.getElementById("pause-btn");
    const nextCanvas = document.getElementById("next-piece");
    const nextCtx = nextCanvas.getContext("2d");

    const W = 12;
    const H = 20;
    const SIZE = 20;

    ctx.scale(SIZE, SIZE);

    let score = 0;
    let lines = 0;
    let level = 1;
    let gameRunning = false;
    let isPaused = false;
    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;
    let animationId = null;
    let nextPieceMatrix = null;
    let lastAction = null;

    let board = createMatrix(W, H);

    const PIECES = [
      [[0,0,0], [1,1,1], [0,1,0]],
      [[0,2,0,0], [0,2,0,0], [0,2,0,0], [0,2,0,0]],
      [[3,3], [3,3]],
      [[0,4,4], [4,4,0], [0,0,0]],
      [[5,5,0], [0,5,5], [0,0,0]],
      [[0,6,0], [0,6,0], [0,6,6]],
      [[0,7,0], [0,7,0], [7,7,0]]
    ];

    const COLORS = [null, "#F00", "#0CF", "#FF0", "#0F0", "#F0F", "#F80", "#00F"];

    const player = { pos: { x: 0, y: 0 }, matrix: null };

    function createMatrix(w, h) {
      const matrix = [];
      while (h--) { matrix.push(new Array(w).fill(0)); }
      return matrix;
    }

    function newPiece() {
      const typeId = Math.floor(Math.random() * PIECES.length);
      return PIECES[typeId].map(row => [...row]);
    }

    function drawMatrix(matrix, offset, isGhost = false) {
      matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            if (isGhost) {
              ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
              ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
              ctx.lineWidth = 0.05;
              ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
              ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
            } else {
              ctx.fillStyle = COLORS[value];
              ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
              ctx.lineWidth = 0.05;
              ctx.strokeStyle = "rgba(0,0,0,0.5)";
              ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
            }
          }
        });
      });
    }

    function draw() {
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawMatrix(board, { x: 0, y: 0 });
      
      if (player.matrix) {
        const ghost = { matrix: player.matrix, pos: { x: player.pos.x, y: player.pos.y } };
        while (!collide(board, ghost)) { ghost.pos.y++; }
        ghost.pos.y--;
        drawMatrix(ghost.matrix, ghost.pos, true);
        drawMatrix(player.matrix, player.pos);
      }
    }

    function collide(board, player) {
      const m = player.matrix, o = player.pos;
      for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
          if (m[y][x] !== 0 && (board[y + o.y] && board[y + o.y][x + o.x]) !== 0) {
            return true;
          }
        }
      }
      return false;
    }

    function merge(board, player) {
      player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) { board[y + player.pos.y][x + player.pos.x] = value; }
        });
      });
    }

    function rotate(matrix, dir) {
      for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) {
          [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
      }
      if (dir > 0) matrix.forEach(row => row.reverse());
      else matrix.reverse();
    }

    function playerRotate(dir) {
      const pos = player.pos.x;
      let offset = 1;
      rotate(player.matrix, dir);
      while (collide(board, player)) {
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));
        if (offset > player.matrix[0].length) {
          rotate(player.matrix, -dir);
          player.pos.x = pos;
          return;
        }
      }
      lastAction = 'rotate';
    }

    function playerMove(offset) {
      player.pos.x += offset;
      if (collide(board, player)) { player.pos.x -= offset; } 
      else { lastAction = 'move'; }
    }

    function checkTSpin() {
      if (!player.matrix.some(row => row.includes(1))) return false;
      if (lastAction !== 'rotate') return false;

      let occupiedCorners = 0;
      const px = player.pos.x, py = player.pos.y;
      const corners = [{x: px, y: py}, {x: px + 2, y: py}, {x: px, y: py + 2}, {x: px + 2, y: py + 2}];

      corners.forEach(c => {
        if (c.x < 0 || c.x >= W || c.y >= H) occupiedCorners++;
        else if (c.y >= 0 && board[c.y][c.x] !== 0) occupiedCorners++;
      });
      return occupiedCorners >= 3;
    }

    function playerDrop() {
      player.pos.y++;
      if (collide(board, player)) {
        player.pos.y--;
        let isTSpin = checkTSpin();
        merge(board, player);
        playerReset();
        clearLines(isTSpin);
      } else {
        lastAction = 'drop';
      }
      dropCounter = 0;
    }

    function drawNextPiece() {
      nextCtx.fillStyle = "#000";
      nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
      if (!nextPieceMatrix) return;
      const blockSize = 20;
      const offsetX = (nextCanvas.width - nextPieceMatrix[0].length * blockSize) / 2;
      const offsetY = (nextCanvas.height - nextPieceMatrix.length * blockSize) / 2;
      
      nextPieceMatrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            nextCtx.fillStyle = COLORS[value];
            nextCtx.fillRect(offsetX + x * blockSize, offsetY + y * blockSize, blockSize, blockSize);
            nextCtx.lineWidth = 1;
            nextCtx.strokeStyle = "rgba(0,0,0,0.5)";
            nextCtx.strokeRect(offsetX + x * blockSize, offsetY + y * blockSize, blockSize, blockSize);
          }
        });
      });
    }

    function playerReset() {
      if (!nextPieceMatrix) nextPieceMatrix = newPiece();
      player.matrix = nextPieceMatrix;
      nextPieceMatrix = newPiece();
      drawNextPiece();
      player.pos.y = 0;
      player.pos.x = Math.floor((W / 2) - (player.matrix[0].length / 2));
      if (collide(board, player)) gameOver();
    }

    function showMessage(text) {
      const msgOverlay = document.getElementById("msg-overlay");
      msgOverlay.innerText = text;
      msgOverlay.style.opacity = 1;
      setTimeout(() => { msgOverlay.style.opacity = 0; }, 1000);
    }

    function clearLines(isTSpin) {
      let linesCleared = 0;
      outer: for (let y = board.length - 1; y >= 0; --y) {
        for (let x = 0; x < board[y].length; ++x) {
          if (board[y][x] === 0) continue outer;
        }
        const row = board.splice(y, 1)[0].fill(0);
        board.unshift(row);
        ++y;
        linesCleared++;
      }

      if (linesCleared > 0 || isTSpin) {
        let basePoints = 0;
        if (isTSpin) {
          const tSpinPoints = [400, 800, 1200, 1600];
          basePoints = tSpinPoints[linesCleared] || 1600;
          showMessage(linesCleared > 0 ? t('tspinLines', {n: linesCleared}) : t('tspin'));
        } else if (linesCleared > 0) {
          const points = [0, 100, 300, 500, 800];
          basePoints = points[linesCleared] || 800;
        }
        score += basePoints * level;
        lines += linesCleared;
        level = Math.floor(lines / 10) + 1;
        dropInterval = Math.max(100, 1000 - (level - 1) * 100);
        updateScore();
      }
      lastAction = null;
    }

    function updateScore() {
      scoreEl.innerText = score;
      linesEl.innerText = lines;
      levelEl.innerText = level;
    }

    function update(time = 0) {
      if (!gameRunning || isPaused) return;
      const deltaTime = time - lastTime;
      lastTime = time;
      dropCounter += deltaTime;
      if (dropCounter > dropInterval) playerDrop();
      draw();
      animationId = requestAnimationFrame(update);
    }

    function startGame() {
      board = createMatrix(W, H);
      score = 0;
      lines = 0;
      level = 1;
      dropInterval = 1000;
      updateScore();
      nextPieceMatrix = null;
      playerReset();
      gameRunning = true;
      isPaused = false;
      
      startBtn.innerText = t('restart');
      pauseBtn.disabled = false;
      pauseBtn.innerText = t('pause');
      overlay.classList.add("hidden");
      
      lastTime = performance.now();
      update();
    }

    function togglePause() {
      if (!gameRunning) return;
      isPaused = !isPaused;
      if (isPaused) {
        cancelAnimationFrame(animationId);
        pauseBtn.innerText = t('resume');
        overlay.innerText = t('paused');
        overlay.classList.remove("hidden");
      } else {
        pauseBtn.innerText = t('pause');
        overlay.classList.add("hidden");
        lastTime = performance.now();
        update();
      }
    }

    function gameOver() {
      gameRunning = false;
      cancelAnimationFrame(animationId);
      pauseBtn.disabled = true;
      overlay.innerHTML = `${t('gameOver')}<br><span style="font-size:16px; color:#ccc;">${t('finalScore')}: ${score}</span>`;
      overlay.classList.remove("hidden");
    }

    startBtn.addEventListener("click", () => {
      startGame();
      startBtn.blur();
    });

    pauseBtn.addEventListener("click", () => {
      togglePause();
      pauseBtn.blur();
    });

    document.addEventListener("keydown", event => {
      if (event.code === "Space") {
        event.preventDefault();
        if (gameRunning) togglePause();
        return;
      }
      if (!gameRunning || isPaused) return;
      switch (event.code) {
        case "ArrowLeft": playerMove(-1); event.preventDefault(); break;
        case "ArrowRight": playerMove(1); event.preventDefault(); break;
        case "ArrowDown": playerDrop(); event.preventDefault(); break;
        case "ArrowUp": playerRotate(1); event.preventDefault(); break;
      }
      draw();
    });

    draw();

  </script>
</body>
</html>
